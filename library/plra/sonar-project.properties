# =============================================================================
# PLRA — SonarQube Configuration
# =============================================================================
# For SonarCloud: used by GitHub Actions CI pipeline
# For local: run `mvn sonar:sonar` after `mvn verify`
# =============================================================================

sonar.projectKey=td-plra
sonar.organization=td-plra
sonar.projectName=PLRA - Product Lending Rate Administration

# Source paths
sonar.sources=plra-api/src/main/java,plra-ui/src/app
sonar.tests=plra-api/src/test/java
sonar.java.binaries=plra-api/target/classes

# Exclusions (generated code, test fixtures, prototypes)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/target/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/test/**,\
  plra-ui/src/app/demo/**,\
  **/Q*.java

# Coverage
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=plra-api/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=plra-ui/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate thresholds (enforced in SonarCloud settings)
# - Coverage > 80%
# - No critical/blocker bugs
# - No security hotspots unreviewed
# - Duplicated lines < 3%
