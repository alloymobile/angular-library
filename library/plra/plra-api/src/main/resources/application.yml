spring:
  application:
    name: plra-api

  datasource:
    url: jdbc:h2:mem:plra;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: embedded

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  servlet:
    context-path: /plra

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.td.plra: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: azure

  datasource:
    url: ${AZURE_SQL_URL:jdbc:sqlserver://plra-dev-sqlsrv.database.windows.net:1433;database=plra-dev-db;encrypt=true;trustServerCertificate=true;loginTimeout=30}
    username: ${AZURE_SQL_USERNAME:plra_admin}
    password: ${AZURE_SQL_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: RATEMGMT

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: false

logging:
  level:
    com.td.plra: INFO
    org.hibernate.SQL: WARN
